<div class="forgot-wrapper">
  
  <div class="top-nav">
    <a [routerLink]="['/auth/login']" class="home-btn">
      <mat-icon>arrow_back</mat-icon>
      <span>Back to Login</span>
    </a>
  </div>

  <div class="split-layout">
    
    <!-- Left panel: Illustration -->
    <div class="left-panel">
      <div class="glow-accent-1"></div>
      <div class="glow-accent-2"></div>
      
      <div class="illustration-container">
        <img 
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9PHi5lnICeV3eWOVbf0_hbbO4-TcrGnjySKU9_nefmpKECpQ55iiVHsYvEC4BMTAjWfcFKA-pjhS9nC4LQ4ATYkzdtpIiRbzgHJ1tPw3JB5Wvpy1gqt192huDabnLShQfrT3_afBGBFSNu1-Xz7weYaH5G-IS_uWFod3FqzmRaNz7inubxfIxQFmkuGYVkwms_oDnft2cRQbUXs87bU_DQi-oAy2QOLAB5xbppRwz6Cn7N-5ge9EllE4hWVjA1gx-29DcypYp2lYf"
          alt="Forgot Password Illustration"
          class="illustration-img"
        />
      </div>
    </div>

    <!-- Right panel: Form -->
    <div class="right-panel">
      
      <div class="logo-wrapper">
        <div class="logo-badge">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="logo-icon">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <span class="logo-title">Medi<span class="logo-accent">Sync</span></span>
      </div>

      <div class="form-container">
        <div class="header-text">
          <h2>Password Recovery</h2>
          <p>Please enter your email to receive recovery instructions</p>
        </div>

        @if (errorStatus()) {
          <div class="alert alert-error">
            {{ errorStatus() }}
          </div>
        }

        <form (ngSubmit)="handleSubmit()" class="forgot-form">
          <div class="form-group">
            <label class="form-label">Email Address *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">mail</mat-icon>
              <input type="email" name="email" [(ngModel)]="email" placeholder="name@example.com" class="form-input" required />
            </div>
          </div>

          <button type="submit" class="submit-btn btn-primary">
            Send Instructions
          </button>
        </form>

        <div class="login-link">
          Remembered your password? 
          <a [routerLink]="['/auth/login']" class="login-redirect">Sign In</a>
        </div>
      </div>

      <footer class="forgot-footer">
        <p>© 2026 MediSync. All rights reserved.</p>
      </footer>

    </div>

  </div>

</div>
