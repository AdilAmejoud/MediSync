<div class="page-layout">
  <ms-sidebar 
    [role]="role" 
    [navItems]="navItems" 
    [collapsed]="isSidebarCollapsed" 
    (toggleCollapse)="toggleSidebar()"
  ></ms-sidebar>
  
  <div class="main-area">
    <ms-topbar [title]="pageTitle" [user]="currentUser"></ms-topbar>
    
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
