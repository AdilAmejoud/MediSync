<aside class="sidebar-wrapper" [class.collapsed]="collapsed">
  <!-- Header: Logo + Toggle -->
  <div class="sidebar-header">
    @if (!collapsed) {
      <div class="logo-area" [routerLink]="['/']" title="Go to Landing Page">
        <div class="logo-badge">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <span class="logo-text">Medi<span class="logo-accent">Sync</span></span>
      </div>
    }
    <button 
      (click)="toggleCollapse.emit()" 
      class="toggle-btn" 
      [title]="collapsed ? 'Expand Menu' : 'Collapse Menu'"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="toggle-chevron">
        @if (collapsed) {
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        }
      </svg>
    </button>
  </div>

  <!-- Navigation items -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.label) {
      <a 
        [routerLink]="item.route" 
        routerLinkActive="active" 
        [routerLinkActiveOptions]="{ exact: item.exact || false }" 
        class="nav-link"
        [attr.data-tooltip]="item.label"
      >
        <ng-icon [name]="item.icon" class="nav-icon" size="18" color="currentColor"></ng-icon>
        @if (!collapsed) {
          <span class="nav-label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Bottom Section: Settings & Sign Out -->
  <div class="sidebar-footer">
    <a 
      [routerLink]="['/' + role + '/settings']" 
      routerLinkActive="active" 
      class="nav-link footer-link" 
      [attr.data-tooltip]="'Settings'"
    >
      <ng-icon name="heroCog6Tooth" class="nav-icon" size="18" color="currentColor"></ng-icon>
      @if (!collapsed) {
        <span class="nav-label">Settings</span>
      }
    </a>
    
    <button 
      (click)="onLogout()" 
      class="logout-btn" 
      [attr.data-tooltip]="'Sign Out'"
    >
      <ng-icon name="heroArrowRightOnRectangle" class="nav-icon text-danger" size="18" color="#DC2626"></ng-icon>
      @if (!collapsed) {
        <span class="nav-label text-danger">Sign Out</span>
      }
    </button>
  </div>
</aside>
